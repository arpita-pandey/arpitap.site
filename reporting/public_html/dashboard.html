<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333}

/* Layout */
.layout{display:grid;grid-template-columns:200px 1fr;grid-template-rows:auto 1fr auto;grid-template-areas:"header header""sidebar content""footer footer";min-height:100vh}
header{grid-area:header;background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header .logo{font-size:18px;font-weight:700;text-decoration:none;color:#fff;margin-right:auto}
header .date-range{display:flex;align-items:center;gap:8px;font-size:13px}
header input[type=date]{padding:5px 8px;border-radius:4px;border:none;font-size:13px;background:#2d2d4e;color:#fff;cursor:pointer}
header .date-error{color:#ff6b6b;font-size:12px}
header .user-info{font-size:13px;opacity:.8}
header .btn-logout{background:#e74c3c;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:13px}
header .hamburger{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer}

aside{grid-area:sidebar;background:#16213e;padding:20px 0}
aside nav a{display:block;padding:12px 20px;color:#aaa;text-decoration:none;font-size:14px;transition:background .2s,color .2s}
aside nav a:hover{background:#0f3460;color:#fff}
aside nav a.active{background:#0f3460;color:#fff;border-left:3px solid #667eea}
aside nav a.admin-only{display:none}

main{grid-area:content;padding:24px;overflow-x:hidden}
footer{grid-area:footer;background:#1a1a2e;color:#aaa;text-align:center;padding:10px;font-size:12px}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.card .label{font-size:12px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card .value{font-size:28px;font-weight:700;color:#1a1a2e}
.card .icon{font-size:28px;margin-bottom:8px}

/* Charts */
.chart-box{background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:24px}
.chart-box h3{margin-bottom:16px;font-size:15px;color:#555}
canvas{display:block;max-width:100%}

/* Table */
.table-box{background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:24px;overflow-x:auto}
.table-box h3{margin-bottom:16px;font-size:15px;color:#555}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f8f9fa;padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid #eee}
td{padding:10px 12px;border-bottom:1px solid #eee}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,#e8e8e8 25%,#f5f5f5 50%,#e8e8e8 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:90px;margin-bottom:16px}
.skel-chart{height:200px;margin-bottom:24px}
.skel-row{height:36px;margin-bottom:8px}
.skeleton-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}

/* Login */
#login-view{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)}
.login-box{background:#fff;border-radius:12px;padding:40px;width:360px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.login-box h2{margin-bottom:24px;text-align:center;color:#1a1a2e}
.login-box input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:14px}
.login-box input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.2)}
.login-box button{width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.login-box .error{color:#e74c3c;font-size:13px;margin-bottom:12px;text-align:center}

/* Error/empty states */
.state-msg{text-align:center;padding:40px;color:#999}
.state-msg .icon{font-size:40px;margin-bottom:12px}
.retry-btn{background:#667eea;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-top:10px}

/* Error badge */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.badge-red{background:#fde8e8;color:#e74c3c}
.badge-green{background:#e8f8ee;color:#2ecc71}

/* Expandable stack trace */
.stack-row{cursor:pointer;user-select:none}
.stack-row:hover td{background:#f0f4ff!important}
.stack-trace{font-family:monospace;font-size:12px;white-space:pre-wrap;background:#1a1a2e;color:#a8ff78;padding:12px;border-radius:4px;margin:4px 0 8px;display:none}
.stack-trace.open{display:block}

/* Admin form */
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
.form-row input,.form-row select{padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px}
.form-row button{padding:8px 16px;background:#667eea;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px}
.btn-delete{background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.btn-delete:disabled{opacity:.4;cursor:not-allowed}

/* Decisions */
.badge-yellow{background:#fff8e1;color:#f39c12}
.metric-change{font-size:12px;font-weight:600;margin-left:6px}
.metric-change.up{color:#e74c3c}
.metric-change.down{color:#2ecc71}
.metric-change.neutral{color:#999}
.priority-critical{color:#fff;background:#e74c3c;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.priority-high{color:#fff;background:#f39c12;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.priority-medium{color:#333;background:#fff3cd;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.priority-low{color:#666;background:#e8e8e8;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.budget-over{background:#fde8e8}
.budget-under{background:#e8f8ee}

/* Responsive */
@media(max-width:768px){
  .layout{grid-template-columns:1fr;grid-template-areas:"header""content""footer"}
  aside{position:fixed;left:-240px;top:0;width:240px;height:100vh;z-index:200;transition:left .3s;padding-top:60px}
  aside.open{left:0}
  header .hamburger{display:block}
  .cards,.skeleton-cards{grid-template-columns:1fr}
  .form-row{flex-direction:column}
}
</style>
</head>
<body>

<noscript>
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)">
<div style="background:#fff;border-radius:12px;padding:50px;text-align:center;max-width:460px;box-shadow:0 10px 40px rgba(0,0,0,.2)">
<h1 style="font-size:40px;margin-bottom:12px">📊</h1>
<h2 style="margin-bottom:8px;color:#1a1a2e">JavaScript Required</h2>
<p style="color:#666;font-size:14px">This analytics dashboard requires JavaScript to function. Please enable JavaScript in your browser settings and reload the page.</p>
</div>
</div>
</noscript>

<!-- LOGIN -->
<div id="login-view" style="display:none">
  <div class="login-box">
    <h2>📊 Analytics</h2>
    <div id="login-error" class="error" style="display:none"></div>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    <button id="login-btn">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none">
<div class="layout">
  <header>
    <button class="hamburger" id="hamburger">☰</button>
    <a href="#/overview" class="logo">📊 Analytics</a>
    <div class="date-range">
      <label>From <input type="date" id="start-date"></label>
      <label>To <input type="date" id="end-date"></label>
      <button id="apply-dates" style="padding:5px 10px;background:#667eea;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px">Apply</button>
      <span id="date-error" class="date-error"></span>
    </div>
    <span class="user-info" id="user-display"></span>
    <button class="btn-logout" id="logout-btn">Logout</button>
  </header>

  <aside id="sidebar">
    <nav>
      <a href="#/overview"    id="nav-overview">📈 Overview</a>
      <a href="#/performance" id="nav-performance">⚡ Performance</a>
      <a href="#/errors"      id="nav-errors">🚨 Errors</a>
      <a href="#/reports"     id="nav-reports">📝 Reports</a>
      <a href="#/decisions"   id="nav-decisions">🎯 Decisions</a>
      <a href="#/admin"       id="nav-admin">👥 Admin</a>
    </nav>
  </aside>

  <main id="main-content"></main>
  <footer>Analytics Dashboard · CSE 135</footer>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('auth_token'),
  user:  JSON.parse(localStorage.getItem('auth_user') || 'null'),
  start: localStorage.getItem('dash_start') || daysAgo(30),
  end:   localStorage.getItem('dash_end')   || today(),
};

function today()       { return new Date().toISOString().slice(0,10); }
function daysAgo(n)    { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function fmtDate(s)    { return s ? new Date(s).toLocaleDateString() : '—'; }
function fmtNum(n)     { return Number(n).toLocaleString(); }
function parseBrowser(ua) {
  if (!ua) return '—';
  if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
  if (ua.includes('Edg')) return 'Edge';
  if (ua.includes('Firefox')) return 'Firefox';
  if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
  return ua.slice(0,20);
}

// ── Auth ───────────────────────────────────────────────────────────────────
function saveAuth(token, user) {
  state.token = token; state.user = user;
  localStorage.setItem('auth_token', token);
  localStorage.setItem('auth_user', JSON.stringify(user));
}
function clearAuth() {
  state.token = null; state.user = null;
  localStorage.removeItem('auth_token');
  localStorage.removeItem('auth_user');
}

// ── API ────────────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  try {
    const res = await fetch(path, {
      ...opts,
      headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${state.token}`, ...(opts.headers||{}) }
    });
    if (res.status === 401) { clearAuth(); showLogin(); return null; }
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    return res.json();
  } catch(err) {
    showError(err.message, () => route());
    return null;
  }
}
function showError(msg, retryFn) {
  const el = document.getElementById('main-content');
  el.innerHTML = '';
  const box = document.createElement('div'); box.className='state-msg';
  const icon = document.createElement('div'); icon.className='icon'; icon.textContent='⚠️';
  const p = document.createElement('p'); p.textContent = msg || 'Something went wrong';
  box.append(icon, p);
  if (retryFn) {
    const btn = document.createElement('button'); btn.className='retry-btn'; btn.textContent='Retry';
    btn.addEventListener('click', retryFn);
    box.appendChild(btn);
  }
  el.appendChild(box);
}

// ── Router ─────────────────────────────────────────────────────────────────
function getRoute() {
  const hash = location.hash || '#/overview';
  return hash.split('?')[0].replace('#/','') || 'overview';
}

async function route() {
  if (!state.token) { showLogin(); return; }
  showApp();
  // Parse date params from URL hash for bookmarkability
  const hashParams = (location.hash.split('?')[1] || '');
  const urlParams = new URLSearchParams(hashParams);
  if (urlParams.get('start')) state.start = urlParams.get('start');
  if (urlParams.get('end')) state.end = urlParams.get('end');
  syncDateInputs();
  highlightNav();
  const r = getRoute();
  const secs = state.user?.sections || [];
  // Check section access (sub-routes like report/123 fall under 'reports')
  const viewSection = r.startsWith('report/') || r === 'create-report' || r.startsWith('edit-report/') ? 'reports' : r;
  if (viewSection && !secs.includes(viewSection) && viewSection !== 'login') {
    // Redirect to first allowed section
    location.hash = '#/' + (secs[0] || 'overview');
    return;
  }
  if (r === 'overview')         await renderOverview();
  else if (r === 'performance') await renderPerformance();
  else if (r === 'errors')      await renderErrors();
  else if (r === 'reports')     await renderReports();
  else if (r === 'decisions')   await renderDecisions();
  else if (r.startsWith('report/'))       await renderViewReport(r.split('/')[1]);
  else if (r === 'create-report')         await renderCreateReport();
  else if (r.startsWith('edit-report/'))   await renderEditReport(r.split('/')[1]);
  else if (r === 'admin')       await renderAdmin();
  else location.hash = '#/' + (secs[0] || 'overview');
}

// ── Auto-login from login.php JWT redirect ────────────────────────────────
function checkAuthRedirect() {
  const hash = location.hash;
  if (hash.startsWith('#/auth/')) {
    const token = hash.replace('#/auth/', '');
    // Decode JWT payload to get user info
    try {
      const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      saveAuth(token, { id: payload.sub, username: payload.username, role: payload.role });
    } catch(e) {}
    location.hash = '#/overview';
    return true;
  }
  return false;
}

window.addEventListener('hashchange', route);
window.addEventListener('load', () => { if (!checkAuthRedirect()) route(); });

// ── Show/Hide ──────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-view').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const u = document.getElementById('user-display');
  u.textContent = state.user ? `${state.user.username} (${state.user.role})` : '';
  // Show/hide nav links based on user sections
  const secs = state.user?.sections || [];
  ['overview','performance','errors','reports','decisions','admin'].forEach(view => {
    const el = document.getElementById('nav-'+view);
    if (el) el.style.display = secs.includes(view) ? 'block' : 'none';
  });
}
function highlightNav() {
  const r = getRoute();
  ['overview','performance','errors','reports','decisions','admin'].forEach(id => {
    const el = document.getElementById('nav-'+id);
    if (el) el.classList.toggle('active', id === r);
  });
}

// ── Date controls ──────────────────────────────────────────────────────────
function syncDateInputs() {
  document.getElementById('start-date').value = state.start;
  document.getElementById('end-date').value   = state.end;
}

document.getElementById('apply-dates').addEventListener('click', () => {
  const s = document.getElementById('start-date').value;
  const e = document.getElementById('end-date').value;
  const err = document.getElementById('date-error');
  if (s > e) { err.textContent = 'Start must be ≤ end'; return; }
  err.textContent = '';
  state.start = s; state.end = e;
  localStorage.setItem('dash_start', s);
  localStorage.setItem('dash_end',   e);
  // Update URL hash with dates
  const base = '#/' + getRoute();
  history.replaceState(null,'', `${base}?start=${s}&end=${e}`);
  route();
});

// ── Hamburger ──────────────────────────────────────────────────────────────
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// ── Logout ─────────────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', () => {
  clearAuth();
  // Also destroy PHP session
  fetch('/logout.php').catch(()=>{});
  location.hash = '#/login';
  showLogin();
});

// ── Login ──────────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent='Enter username and password'; errEl.style.display='block'; return; }
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  const data = await fetch('/api/login.php', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username, password})
  }).then(r=>r.json()).catch(()=>null);
  btn.textContent='Sign In'; btn.disabled=false;
  if (!data || data.error) {
    errEl.textContent = data?.error || 'Login failed'; errEl.style.display='block'; return;
  }
  data.user.sections = data.user.sections || [];
  saveAuth(data.token, data.user);
  location.hash = '#/overview';
  route();
}

// ── Skeleton helpers ───────────────────────────────────────────────────────
function skeletonCards() {
  return `<div class="skeleton-cards">${'<div class="skeleton skel-card"></div>'.repeat(4)}</div>`;
}
function skeletonChart() { return `<div class="skeleton skel-chart"></div>`; }
function skeletonRows(n=5) { return Array(n).fill(`<div class="skeleton skel-row"></div>`).join(''); }

// ── Canvas chart helpers ───────────────────────────────────────────────────
function drawLineChart(canvas, labels, values, color='#667eea', label='') {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:20, right:20, bottom:40, left:55};
  ctx.clearRect(0,0,W,H);

  const max = Math.max(...values, 1);
  const xs = (i) => pad.left + (i / Math.max(labels.length-1,1)) * (W - pad.left - pad.right);
  const ys = (v) => pad.top  + (1 - v/max) * (H - pad.top - pad.bottom);

  // Grid lines
  ctx.strokeStyle='#eee'; ctx.lineWidth=1;
  for (let i=0;i<=4;i++) {
    const y = pad.top + (i/4)*(H-pad.top-pad.bottom);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText(Math.round(max*(1-i/4)), pad.left-6, y+4);
  }

  // X axis labels
  ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  const step = Math.ceil(labels.length / 8);
  labels.forEach((lbl,i) => {
    if (i % step === 0) ctx.fillText(lbl, xs(i), H-pad.bottom+16);
  });

  if (values.length < 2) return;

  // Fill
  ctx.beginPath();
  ctx.moveTo(xs(0), ys(values[0]));
  values.forEach((_,i) => ctx.lineTo(xs(i), ys(values[i])));
  ctx.lineTo(xs(values.length-1), H-pad.bottom);
  ctx.lineTo(xs(0), H-pad.bottom);
  ctx.closePath();
  ctx.fillStyle = color + '22';
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xs(0), ys(values[0]));
  values.forEach((_,i) => ctx.lineTo(xs(i), ys(values[i])));
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.stroke();

  // Dots
  values.forEach((v,i) => {
    ctx.beginPath(); ctx.arc(xs(i),ys(v),4,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
  });
}

function drawBarChart(canvas, labels, values, color='#667eea') {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:20, right:20, bottom:60, left:55};
  ctx.clearRect(0,0,W,H);

  const max = Math.max(...values, 1);
  const n = labels.length;
  const barW = Math.max(8, (W - pad.left - pad.right) / n - 8);

  // Grid
  ctx.strokeStyle='#eee'; ctx.lineWidth=1;
  for (let i=0;i<=4;i++) {
    const y = pad.top + (i/4)*(H-pad.top-pad.bottom);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText(Math.round(max*(1-i/4)), pad.left-6, y+4);
  }

  labels.forEach((lbl, i) => {
    const x = pad.left + (i+0.5) * (W-pad.left-pad.right)/n - barW/2;
    const barH = (values[i]/max) * (H-pad.top-pad.bottom);
    const y = pad.top + (H-pad.top-pad.bottom) - barH;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x,y,barW,barH,3) : ctx.rect(x,y,barW,barH);
    ctx.fill();

    // Label
    ctx.fillStyle='#666'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    const shortLbl = lbl.length > 12 ? lbl.slice(0,11)+'…' : lbl;
    ctx.save(); ctx.translate(x+barW/2, H-pad.bottom+8);
    ctx.rotate(-Math.PI/6); ctx.fillText(shortLbl,0,0); ctx.restore();
  });
}

// ── Overview ───────────────────────────────────────────────────────────────
async function renderOverview() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<h2 style="margin-bottom:20px">Overview</h2>${skeletonCards()}${skeletonChart()}${skeletonChart()}`;

  const data = await api(`/api/overview.php?start=${state.start}&end=${state.end}`);
  if (!data) return;

  const s = data.summary;
  el.innerHTML = `<h2 style="margin-bottom:20px">Overview</h2>`;

  // Summary cards
  const cards = el.appendChild(document.createElement('div'));
  cards.className = 'cards';
  [
    {icon:'👥', label:'Sessions',    value: fmtNum(s.total_sessions)},
    {icon:'📄', label:'Pageviews',   value: fmtNum(s.total_pageviews)},
    {icon:'⚡', label:'Avg Load',    value: s.avg_load ? s.avg_load+'ms' : '—'},
    {icon:'🚨', label:'Errors',      value: fmtNum(s.error_count)},
  ].forEach(c => {
    const d = document.createElement('div');
    d.className = 'card';
    const icon  = document.createElement('div'); icon.className='icon';  icon.textContent=c.icon;

    // Role dropdown
    const td3=row.insertCell();
    const rSel2=document.createElement('select'); rSel2.style.fontSize='13px';rSel2.style.padding='3px';
    ['viewer','analyst','super_admin'].forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;if(r===u.role)o.selected=true;rSel2.appendChild(o);});
    if(u.role==='super_admin') rSel2.disabled=true;
    td3.appendChild(rSel2);

    const td4=row.insertCell();
    const badge=document.createElement('span');
    badge.className='badge '+(u.is_active?'badge-green':'badge-red');
    badge.textContent=u.is_active?'Active':'Inactive';
    td4.appendChild(badge);

    const td5=row.insertCell(); td5.textContent=fmtDate(u.created_at);

    const td6=row.insertCell();

    if(u.role==='super_admin') saveBtn.disabled=true;
    saveBtn.addEventListener('click', async ()=>{
      await api(`/api/users.php?id=${u.id}`,{method:'PUT',body:JSON.stringify({role:rSel2.value,is_active:u.is_active})});
      renderAdmin();
    });

    const delBtn=document.createElement('button'); delBtn.className='btn-delete'; delBtn.textContent='Delete';

}

  el.innerHTML = '';

  const h2 = document.createElement('h2'); h2.textContent = 'Edit Report'; h2.style.marginBottom = '20px';
  el.appendChild(h2);

  const formCard = document.createElement('div'); formCard.className = 'card';

  // Title
  const titleLabel = document.createElement('label'); titleLabel.textContent = 'Title';
  titleLabel.style.cssText = 'display:block;font-weight:600;margin-bottom:6px';
  const titleInput = document.createElement('input');
  titleInput.style.cssText = 'width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;margin-bottom:16px';
  titleInput.value = report.title;

  // Category
  const catLabel = document.createElement('label'); catLabel.textContent = 'Category';
  catLabel.style.cssText = 'display:block;font-weight:600;margin-bottom:6px';
  const catSel = document.createElement('select');
  catSel.style.cssText = 'width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;margin-bottom:16px';
  categories.forEach(c => {
    const o = document.createElement('option'); o.value = c.id;
    o.textContent = c.section_name + ' > ' + c.name;
    if (parseInt(c.id) === parseInt(report.category_id)) o.selected = true;
    catSel.appendChild(o);
  });

  // Content
  const contLabel = document.createElement('label'); contLabel.textContent = 'Content (HTML allowed)';
  contLabel.style.cssText = 'display:block;font-weight:600;margin-bottom:6px';
  const contArea = document.createElement('textarea');
  contArea.style.cssText = 'width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;margin-bottom:16px;min-height:200px;font-family:monospace';
  contArea.value = report.content || '';

  // Comments
  const commLabel = document.createElement('label'); commLabel.textContent = 'Analyst Comments';
  commLabel.style.cssText = 'display:block;font-weight:600;margin-bottom:6px';
  const commArea = document.createElement('textarea');
  commArea.style.cssText = 'width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;margin-bottom:16px;min-height:100px';
  commArea.value = report.analyst_comments || '';

  // Options row
  const optRow = document.createElement('div'); optRow.style.cssText = 'display:flex;gap:16px;margin-bottom:16px;align-items:center';

  const pubLabel = document.createElement('label');
  const pubCheck = document.createElement('input'); pubCheck.type = 'checkbox';
  pubCheck.checked = !!report.is_public;
  pubLabel.append(pubCheck, ' Public');

  const statusSel = document.createElement('select');
  statusSel.style.cssText = 'padding:8px;border:1px solid #ddd;border-radius:4px';
  ['draft','published'].forEach(s => {
    const o = document.createElement('option'); o.value = s; o.textContent = s;
    if (s === report.status) o.selected = true;
    statusSel.appendChild(o);
  });

  optRow.append(pubLabel, statusSel);

  // Buttons
  const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:10px';

  const saveBtn = document.createElement('button');
  saveBtn.textContent = 'Save Changes';
  saveBtn.style.cssText = 'padding:10px 24px;background:#667eea;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.cssText = 'padding:10px 24px;background:#6c757d;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px';
  cancelBtn.addEventListener('click', () => { location.hash = '#/report/' + id; });

  const msg = document.createElement('p'); msg.style.cssText = 'margin-top:12px;font-size:13px';

  saveBtn.addEventListener('click', async () => {
    if (!titleInput.value.trim() || !catSel.value) {
      msg.textContent = 'Title and category are required'; msg.style.color = '#e74c3c'; return;
    }
    const body = {
      title: titleInput.value.trim(),
      category_id: parseInt(catSel.value),
      content: contArea.value,
      analyst_comments: commArea.value,
      is_public: pubCheck.checked ? 1 : 0,
      status: statusSel.value
    };
    saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
    const res = await api('/api/reports.php?id=' + id, { method: 'PUT', body: JSON.stringify(body) });
    saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
    if (res?.message) {
      location.hash = '#/report/' + id;
    } else if (res?.error) {
      msg.textContent = res.error; msg.style.color = '#e74c3c';
    }
  });

  btnRow.append(saveBtn, cancelBtn);
  formCard.append(titleLabel, titleInput, catLabel, catSel, contLabel, contArea, commLabel, commArea, optRow, btnRow, msg);
  el.appendChild(formCard);
}

// ── Decisions ───────────────────────────────────────────────────────────────
async function renderDecisions() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<h2 style="margin-bottom:20px">Making Decisions with Data</h2>${skeletonCards()}${skeletonChart()}${skeletonRows(5)}`;

  const data = await api(`/api/decisions.php?start=${state.start}&end=${state.end}`);
  if (!data) return;

  el.innerHTML = '';
  const h2 = document.createElement('h2'); h2.textContent = 'Making Decisions with Data'; h2.style.marginBottom = '20px';
  el.appendChild(h2);

  // ── 1. Actionable Metrics (period comparison) ──────────────────────────
  const metricsTitle = document.createElement('h3');
  metricsTitle.textContent = 'Actionable Metrics (Period Comparison)';
  metricsTitle.style.cssText = 'margin-bottom:16px;color:#555';
  el.appendChild(metricsTitle);

  const a = data.actionable;
  const cards = document.createElement('div'); cards.className = 'cards';

  function changeEl(curr, prev, lowerIsBetter) {
    if (prev === null || prev === undefined || prev === 0) return '';
    const diff = curr - prev;
    const pct = Math.round((diff / Math.max(prev,1)) * 100);
    const sign = diff > 0 ? '+' : '';
    let cls = 'neutral';
    if (diff !== 0) cls = (lowerIsBetter ? diff > 0 : diff < 0) ? 'up' : 'down';
    return `<span class="metric-change ${cls}">${sign}${pct}%</span>`;
  }

  [
    {icon:'👥', label:'Sessions', value:fmtNum(a.sessions.current), prev:a.sessions.previous, lower:false},
    {icon:'📄', label:'Pageviews/Session', value:a.pv_per_session.current, prev:a.pv_per_session.previous, lower:false},
    {icon:'🚨', label:'Errors per 1k PV', value:a.error_rate_per_1k.current, prev:a.error_rate_per_1k.previous, lower:true},
    {icon:'📊', label:'Total Pageviews', value:fmtNum(a.pageviews.current), prev:a.pageviews.previous, lower:false},
  ].forEach(c => {
    const d = document.createElement('div'); d.className = 'card';
    const icon = document.createElement('div'); icon.className='icon'; icon.textContent=c.icon;
    const lbl = document.createElement('div'); lbl.className='label'; lbl.textContent=c.label;
    const val = document.createElement('div'); val.className='value';
    val.innerHTML = c.value + changeEl(parseFloat(c.value) || c.value, c.prev, c.lower);
    const prev = document.createElement('div');
    prev.style.cssText = 'font-size:11px;color:#999;margin-top:4px';
    prev.textContent = c.prev !== null ? 'Previous: ' + c.prev : '';
    d.append(icon,lbl,val,prev); cards.appendChild(d);
  });
  el.appendChild(cards);

  // Period info
  const periodInfo = document.createElement('p');
  periodInfo.style.cssText = 'font-size:12px;color:#999;margin-bottom:24px';
  periodInfo.textContent = `Current: ${a.current_period.start} to ${a.current_period.end} | Previous: ${a.previous_period.start} to ${a.previous_period.end}`;
  el.appendChild(periodInfo);

  // ── 2. Performance Budgets ─────────────────────────────────────────────
  const budgetBox = document.createElement('div'); budgetBox.className = 'table-box';
  const budgetTitle = document.createElement('h3'); budgetTitle.textContent = 'Performance Budgets';
  budgetBox.appendChild(budgetTitle);

  const budgetDesc = document.createElement('p');
  budgetDesc.style.cssText = 'font-size:13px;color:#666;margin-bottom:14px';
  budgetDesc.textContent = 'Budget: 3000ms load time. Pages exceeding the budget need optimization.';
  budgetBox.appendChild(budgetDesc);

  if (!data.budgets.length) {
    const m = document.createElement('p'); m.className='state-msg'; m.textContent='No performance data';
    budgetBox.appendChild(m);
  } else {
    const table = document.createElement('table');
    const hrow = table.createTHead().insertRow();
    ['Page','Samples','Avg Load (ms)','Prev Period','Change','Budget (ms)','Status'].forEach(h => {
      const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
    });
    const tb = table.createTBody();
    data.budgets.forEach(b => {
      const row = tb.insertRow();
      row.className = b.status === 'over' ? 'budget-over' : 'budget-under';
      const td1 = row.insertCell(); td1.textContent = b.page;
      const td2 = row.insertCell(); td2.textContent = b.samples;
      const td3 = row.insertCell(); td3.textContent = b.avg_load + 'ms';
      const td4 = row.insertCell(); td4.textContent = b.prev_avg_load !== null ? b.prev_avg_load + 'ms' : '—';
      const td5 = row.insertCell();
      if (b.change !== null) {
        const sign = b.change > 0 ? '+' : '';
        td5.textContent = sign + b.change + 'ms';
        td5.style.color = b.change > 0 ? '#e74c3c' : b.change < 0 ? '#2ecc71' : '#999';
        td5.style.fontWeight = '600';
      } else { td5.textContent = '—'; }
      const td6 = row.insertCell(); td6.textContent = b.budget + 'ms';
      const td7 = row.insertCell();
      const badge = document.createElement('span');
      badge.className = 'badge ' + (b.status === 'over' ? 'badge-red' : 'badge-green');
      badge.textContent = b.status === 'over' ? 'Over Budget' : 'Under Budget';
      td7.appendChild(badge);
    });
    budgetBox.appendChild(table);
  }
  el.appendChild(budgetBox);

  // Budget bar chart
  if (data.budgets.length) {
    const chartBox = document.createElement('div'); chartBox.className = 'chart-box';
    const ct = document.createElement('h3'); ct.textContent = 'Load Time vs Budget (ms)';
    chartBox.appendChild(ct);
    const canvas = document.createElement('canvas'); canvas.width = 900; canvas.height = 280;
    chartBox.appendChild(canvas);

    // Custom chart with budget line
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const pad = {top:20, right:20, bottom:60, left:55};
    const labels = data.budgets.map(b => b.page);
    const values = data.budgets.map(b => b.avg_load);
    const budget = 3000;
    const max = Math.max(...values, budget) * 1.1;
    const n = labels.length;
    const barW = Math.max(20, (W - pad.left - pad.right) / n - 12);

    // Grid
    ctx.strokeStyle='#eee'; ctx.lineWidth=1;
    for (let i=0;i<=4;i++) {
      const y = pad.top + (i/4)*(H-pad.top-pad.bottom);
      ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
      ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='right';
      ctx.fillText(Math.round(max*(1-i/4)), pad.left-6, y+4);
    }

    // Budget line
    const budgetY = pad.top + (1 - budget/max) * (H - pad.top - pad.bottom);
    ctx.beginPath(); ctx.setLineDash([6,4]);
    ctx.moveTo(pad.left, budgetY); ctx.lineTo(W-pad.right, budgetY);
    ctx.strokeStyle='#e74c3c'; ctx.lineWidth=2; ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#e74c3c'; ctx.font='bold 11px sans-serif'; ctx.textAlign='left';
    ctx.fillText('Budget: '+budget+'ms', pad.left+4, budgetY-6);

    // Bars
    labels.forEach((lbl, i) => {
      const x = pad.left + (i+0.5) * (W-pad.left-pad.right)/n - barW/2;
      const barH = (values[i]/max) * (H-pad.top-pad.bottom);
      const y = pad.top + (H-pad.top-pad.bottom) - barH;
      ctx.fillStyle = values[i] > budget ? '#e74c3c' : '#2ecc71';
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(x,y,barW,barH,3) : ctx.rect(x,y,barW,barH);
      ctx.fill();

      // Value on top of bar
      ctx.fillStyle='#333'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
      ctx.fillText(values[i]+'ms', x+barW/2, y-6);

      // Label
      ctx.fillStyle='#666'; ctx.font='11px sans-serif';
      const short = lbl.length > 14 ? lbl.slice(0,13)+'…' : lbl;
      ctx.save(); ctx.translate(x+barW/2, H-pad.bottom+8);
      ctx.rotate(-Math.PI/6); ctx.fillText(short,0,0); ctx.restore();
    });

    el.appendChild(chartBox);
  }

  // ── 3. Error Triage ────────────────────────────────────────────────────
  const triageBox = document.createElement('div'); triageBox.className = 'table-box';
  const triageTitle = document.createElement('h3'); triageTitle.textContent = 'Error Triage';
  triageBox.appendChild(triageTitle);

  const triageDesc = document.createElement('p');
  triageDesc.style.cssText = 'font-size:13px;color:#666;margin-bottom:14px';
  triageDesc.textContent = 'Errors ranked by frequency × impact. Critical page errors are weighted higher.';
  triageBox.appendChild(triageDesc);

  if (!data.triage.length) {
    const m = document.createElement('p'); m.className='state-msg'; m.textContent='No errors to triage';
    triageBox.appendChild(m);
  } else {
    const table = document.createElement('table');
    const hrow = table.createTHead().insertRow();
    ['Priority','Error','Count','Per 1k PV','Page','Sessions','Browser','First Seen','Last Seen'].forEach(h => {
      const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
    });
    const tb = table.createTBody();
    data.triage.forEach(t => {
      const row = tb.insertRow();
      const td1 = row.insertCell();
      const pBadge = document.createElement('span');
      pBadge.className = 'priority-' + t.priority.toLowerCase();
      pBadge.textContent = t.priority;
      td1.appendChild(pBadge);
      const td2 = row.insertCell(); td2.textContent = t.message; td2.style.maxWidth='250px'; td2.style.overflow='hidden'; td2.style.textOverflow='ellipsis';
      const td3 = row.insertCell(); td3.textContent = t.count;
      const td4 = row.insertCell(); td4.textContent = t.per_1k_pageviews;
      const td5 = row.insertCell(); td5.textContent = t.page;
      const td6 = row.insertCell(); td6.textContent = t.affected_sessions;
      const td7 = row.insertCell(); td7.textContent = parseBrowser(t.browser);
      const td8 = row.insertCell(); td8.textContent = fmtDate(t.first_seen);
      const td9 = row.insertCell(); td9.textContent = fmtDate(t.last_seen);
    });
    triageBox.appendChild(table);
  }
  el.appendChild(triageBox);

  // ── 4. Decision Framework ──────────────────────────────────────────────
  const fwBox = document.createElement('div'); fwBox.className = 'card';
  fwBox.style.marginBottom = '24px';
  const fwTitle = document.createElement('h3'); fwTitle.textContent = 'Decision Framework';
  fwTitle.style.marginBottom = '14px';
  fwBox.appendChild(fwTitle);

  const steps = [
    {title: 'Measure', desc: 'Collect data via the analytics pipeline (pageviews, performance, errors, events)'},
    {title: 'Analyze', desc: 'Review dashboard trends, compare periods, identify regressions'},
    {title: 'Decide', desc: 'Set priority based on impact. Critical errors → fix now. Budget violations → investigate.'},
    {title: 'Act', desc: 'Deploy fixes, optimize pages, ship improvements'},
    {title: 'Verify', desc: 'Monitor metrics after changes. Did error count drop? Did load time improve?'},
  ];

  const stepList = document.createElement('div');
  stepList.style.cssText = 'display:flex;flex-wrap:wrap;gap:12px';
  steps.forEach((s, i) => {
    const step = document.createElement('div');
    step.style.cssText = 'flex:1;min-width:140px;background:#f8f9fa;border-radius:8px;padding:14px;text-align:center';
    const num = document.createElement('div');
    num.style.cssText = 'width:28px;height:28px;border-radius:50%;background:#667eea;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-bottom:8px';
    num.textContent = i + 1;
    const title = document.createElement('div');
    title.style.cssText = 'font-weight:600;margin-bottom:4px;font-size:14px';
    title.textContent = s.title;
    const desc = document.createElement('div');
    desc.style.cssText = 'font-size:12px;color:#666';
    desc.textContent = s.desc;
    step.append(num, title, desc);
    stepList.appendChild(step);
  });
  fwBox.appendChild(stepList);
  el.appendChild(fwBox);
}
</script>
</body>
</html>
